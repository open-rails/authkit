# Task runner config (https://taskfile.dev). Replaces the old Makefile.
# Run `task --list` to see available tasks.
version: '3'

vars:
  # Pinned sqlc version; `go run` keeps the tool out of the library's go.mod.
  # Override via the SQLC_VERSION env var or `task SQLC_VERSION=vX.Y.Z sqlc`.
  SQLC_VERSION: '{{.SQLC_VERSION | default "v1.31.1"}}'
  SQLC: 'go run github.com/sqlc-dev/sqlc/cmd/sqlc@{{.SQLC_VERSION}}'
  # sqlc vet's db-prepare rule PREPAREs every query against a real database.
  # Defaults to the compose Postgres. Start `docker compose up -d --build issuer`
  # first when you need migrations applied for DB-backed tests.
  SQLC_DATABASE_URL: '{{.SQLC_DATABASE_URL | default "postgres://admin:admin_password@127.0.0.1:35432/authkit_db?sslmode=disable"}}'

# Exported to every task's commands (Makefile: `export SQLC_DATABASE_URL`).
env:
  SQLC_DATABASE_URL: '{{.SQLC_DATABASE_URL}}'

tasks:
  sqlc:
    desc: Regenerate type-safe query code and lint queries (generate + vet, always as a pair)
    cmds:
      - '{{.SQLC}} generate'
      - '{{.SQLC}} vet'

  sqlc-check:
    desc: 'CI guard: fail if committed generated code drifts from queries'
    deps: [sqlc]
    cmds:
      - git diff --exit-code -- internal/db

  test:
    desc: Run the full test suite against the compose Postgres (the `issuer` service)
    env:
      AUTHKIT_TEST_DATABASE_URL: '{{.SQLC_DATABASE_URL}}'
    cmds:
      - go test -p 1 ./...

  test-fast:
    desc: Fast DB-free smoke (race detector, no Postgres). DB-backed tests skip.
    env:
      AUTHKIT_TEST_DATABASE_URL: ''
    cmds:
      - go test -race ./...
