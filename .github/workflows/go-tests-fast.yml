name: go-tests-fast

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: go-tests-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-tests-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Fast DB-free smoke: the mode contributors run locally (`go test ./...`
      # with AUTHKIT_TEST_DATABASE_URL unset). DB-backed integration tests skip
      # in this mode; the full DB-backed suite lives in tests.yml.
      - name: Run DB-free tests with race detector
        env:
          AUTHKIT_TEST_DATABASE_URL: ""
        run: go test -race ./...
