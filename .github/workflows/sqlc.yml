name: sqlc

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: sqlc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # sqlc generate must produce no diff against the committed code in
  # internal/db, and sqlc vet (including the db-prepare rule, which PREPAREs
  # every query against a real Postgres with the migrations applied) must pass.
  #
  # The Postgres is owned by the Taskfile: `task sqlc-check` brings up the compose
  # `postgres` service and applies migrations via `authkit-server migrate` — the
  # exact path used locally — so there is one DB definition (docker-compose.yaml)
  # instead of a second copy duplicated here as a GitHub `services:` container.
  sqlc-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: sqlc generate + vet, fail on drift
        run: task sqlc-check
