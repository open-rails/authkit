name: Security Scan

# Supply-chain / dependency / SCA security scanning, bringing AuthKit to parity
# with the OpenRails security pipeline. This complements (does not replace) the
# Go SAST baseline that already lives in:
#   - go-sast.yml  — gosec (SARIF) + go vet + staticcheck
#   - codeql.yml   — CodeQL dataflow/taint analysis
# Here we add the scanners those two don't cover: dependency CVEs (govulncheck),
# software-composition + secret + misconfig scanning (Trivy), and lint quality
# (golangci-lint, advisory).

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Weekly sweep, Monday 08:00 UTC (after go-sast 06:00 and codeql 07:00).
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

# Run the JavaScript-based actions (checkout, setup-go, harden-runner) on
# Node.js 24. The pinned action versions still declare Node 20, which GitHub
# deprecates on 2026-06-16; this opts into the new runtime ahead of the cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # govulncheck — dependency vulnerability scanning against the Go vuln DB
  # (call-graph aware: only reports vulns this module actually reaches).
  # Fails the build on any KNOWN vulnerability reachable from this module's code.
  # The tree is clean as of the Go 1.26.4 / quic-go v0.57.0 bumps.
  # ---------------------------------------------------------------------------
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Download modules
        run: go mod download
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  # ---------------------------------------------------------------------------
  # Trivy — software-composition analysis + filesystem secret/misconfig scanning.
  # Fails on HIGH/CRITICAL fixable findings.
  # ---------------------------------------------------------------------------
  trivy:
    name: trivy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # NOTE: pin this to a commit SHA to match AuthKit's action-hardening policy
      # once a vetted SHA is chosen (kept on a version tag here for parity with
      # the OpenRails pipeline it mirrors).
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          scanners: vuln,secret,misconfig
          # .runtime holds the auto-generated, git-ignored dev signing key (never
          # committed, absent from CI checkouts); skip it so a local scan or a
          # stray dev artifact can't trip the secret scanner.
          skip-dirs: testing,migrations,agents,**/.runtime
