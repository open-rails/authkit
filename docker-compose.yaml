services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: authkit_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
    ports:
      - "127.0.0.1:35432:5432"
    volumes:
      - authkit_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d authkit_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  issuer:
    build:
      context: .
      dockerfile: cmd/authkit-server/Dockerfile
      network: host
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Dev env: auto-generate signing keys + serve the /dev/* test endpoints.
      AUTHKIT_ENV: dev

      AUTHKIT_LISTEN_ADDR: ":8080"
      AUTHKIT_ISSUER: "http://issuer:8080"
      AUTHKIT_AUDIENCES: "billing-app"

      DB_URL: "postgres://admin:admin_password@postgres:5432/authkit_db?sslmode=disable"

      # Apply the schema on boot — this service doubles as the migration runner
      # the test suite waits on (CI waits for /healthz after migrations).
      AUTHKIT_MIGRATE_ON_START: "true"

      # Dev-only minting endpoint (gated on dev env + this secret):
      AUTHKIT_DEV_MINT_SECRET: "change-me"
    ports:
      - "127.0.0.1:38080:8080"
    volumes:
      # Persist the generated dev signing key across restarts.
      - authkit_runtime_keys:/.runtime/authkit

volumes:
  authkit_postgres_data:
  authkit_runtime_keys:
