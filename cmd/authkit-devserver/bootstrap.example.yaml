users:
  - email: operator@example.com
    username: operator
    email_verified: true
    password:
      plaintext: "change-me"
    root_role: owner

remote_applications:
  - slug: tensorhub-runtime
    issuer: https://tensorhub.example
    jwks_uri: https://tensorhub.example/.well-known/jwks.json
    enabled: true

# These groups and roles must already exist from the host application's
# Config.RBAC and permission-group creation flow.
group_roles:
  - username: operator
    persona: org
    instance_slug: tensorhub
    role: admin
  - remote_application_slug: tensorhub-runtime
    persona: org
    instance_slug: tensorhub
    role: deployer
